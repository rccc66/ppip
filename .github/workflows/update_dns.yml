name: Update Cloudflare DNS

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Chrome & Xvfb
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-linux-signing-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux-signing-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 selenium undetected-chromedriver ddddocr Pillow

      - name: Download cfst
        run: |
          wget -N https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.3.4/cfst_linux_amd64.tar.gz
          tar -zxf cfst_linux_amd64.tar.gz
          chmod +x cfst
          ls -la
          ./cfst -h || true

      - name: Run DNS update script
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python update_dns.py 2>&1
        env:
          FOFA_EMAIL: ${{ secrets.FOFA_EMAIL }}
          FOFA_PASSWORD: ${{ secrets.FOFA_PASSWORD }}
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_DOMAIN: ${{ secrets.CLOUDFLARE_DOMAIN }}
          CLOUDFLARE_DNS_NAME: us

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: debug-artifacts
          path: |
            **/*.png
            cf_speedtest.csv
            cf_ips.txt
          if-no-files-found: ignore
